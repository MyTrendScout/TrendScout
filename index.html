<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendScout — AI Product Discovery</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#1c2128;--bg3:#21262d;
  --border:#30363d;--tx1:#e6edf3;--tx2:#8b949e;
  --purple:#7c3aed;--purple-l:#a78bfa;
  --green:#3fb950;--orange:#d29922;--red:#f85149;
  --viral-bg:#3d1f6e;--viral-tx:#a78bfa;
  --high-bg:#1a3a1a;--high-tx:#3fb950;
  --med-bg:#3d2e0a;--med-tx:#d29922;
}
html,body{height:100%;background:var(--bg0);color:var(--tx1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:16px;border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:600}
.logo-sub{font-size:10px;color:var(--tx2);margin-top:1px}
.nav{padding:8px;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;font-size:13px;color:var(--tx2);border-radius:6px;margin-bottom:1px;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--bg3);color:var(--tx1)}
.nav-item.active{background:var(--purple);color:white}
.nav-icon{font-size:13px;width:16px;text-align:center}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--green);display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{flex:1;overflow-y:auto;min-width:0}
.ph{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;gap:12px}
.ph-left .pt{font-size:20px;font-weight:600}
.ph-left .ps{font-size:12px;color:var(--tx2);margin-top:2px}
.btn-scan{background:var(--purple);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;white-space:nowrap}
.btn-scan:hover{background:#6d28d9}
.btn-scan:disabled{opacity:.5;cursor:not-allowed}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px 16px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.sc-label{font-size:11px;color:var(--tx2);margin-bottom:5px}
.sc-val{font-size:26px;font-weight:600}
.filter-row{padding:0 20px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fb{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.fb:hover{border-color:var(--purple-l);color:var(--tx1)}
.fb.active{background:var(--purple);border-color:var(--purple);color:white}
.exp-btns{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.eb{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--tx1);font-size:11px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap}
.eb:hover{background:var(--bg3)}
.eb.grn{background:var(--high-bg);border-color:var(--green);color:var(--green)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px 20px}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.grid{grid-template-columns:1fr}.sidebar{width:180px}}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s}
.pc:hover{border-color:var(--purple-l)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.pc-name{font-size:12px;font-weight:600;flex:1;padding-right:6px;line-height:1.4}
.rank-b{font-size:10px;color:var(--tx2);background:var(--bg3);padding:2px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.badges{display:flex;gap:4px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.bv{background:var(--viral-bg);color:var(--viral-tx);font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.bh{background:var(--high-bg);color:var(--high-tx);font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.bm{background:var(--med-bg);color:var(--med-tx);font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.bs{font-size:10px;color:var(--purple-l)}
.bsrc{font-size:10px;color:var(--tx2);margin-left:auto}
.pc-desc{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-why{font-size:10px;color:var(--tx2);font-style:italic;border-left:2px solid var(--border);padding-left:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{padding:60px 20px;text-align:center;color:var(--tx2)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-t{font-size:15px;font-weight:600;color:var(--tx1);margin-bottom:5px}
.spin-wrap{padding:60px 20px;text-align:center}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-t{font-size:14px;font-weight:600;margin-bottom:4px}
.spin-s{font-size:12px;color:var(--tx2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.mh{padding:18px 18px 0;display:flex;justify-content:space-between;align-items:flex-start}
.mt{font-size:17px;font-weight:600;flex:1;padding-right:10px;line-height:1.3}
.mc{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:20px;padding:0;line-height:1}
.mc:hover{color:var(--tx1)}
.ms{padding:14px 18px;border-top:1px solid var(--border)}
.ms-t{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.src-box{background:var(--bg3);border-radius:8px;padding:10px 12px}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fin-item .fl{font-size:10px;color:var(--tx2);margin-bottom:3px}
.fin-item .fv{font-size:16px;font-weight:600}
.fv.green{color:var(--green)}
.mkt-btn{width:100%;padding:9px;background:var(--purple);color:white;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;transition:background .15s}
.mkt-btn:hover{background:#6d28d9}
.t5-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px 20px}
@media(max-width:800px){.t5-grid{grid-template-columns:1fr}}
.t5c{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.t5h{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.t5-cat{font-size:14px;font-weight:600}
.t5-cnt{font-size:11px;color:var(--tx2)}
.t5-ex{font-size:11px;color:var(--purple-l);background:none;border:none;cursor:pointer;font-family:inherit}
.t5i{padding:9px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.t5i:last-child{border-bottom:none}
.t5r{font-size:16px;font-weight:600;color:var(--tx2);width:18px;text-align:center;flex-shrink:0}
.t5info{flex:1;min-width:0}
.t5n{font-size:12px;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t5m{font-size:10px;color:var(--green)}
.t5bs{display:flex;gap:3px;flex-shrink:0;align-items:center}
.etsy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px 20px}
@media(max-width:1100px){.etsy-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.etsy-grid{grid-template-columns:1fr}}
.ec{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.ec-name{font-size:13px;font-weight:600;margin-bottom:7px}
.ec-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.ec-cat{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--viral-bg);color:var(--viral-tx)}
.c-low{background:var(--high-bg);color:var(--high-tx);font-size:10px;padding:2px 7px;border-radius:4px}
.c-med{background:var(--med-bg);color:var(--med-tx);font-size:10px;padding:2px 7px;border-radius:4px}
.c-high{background:#3d1515;color:#f85149;font-size:10px;padding:2px 7px;border-radius:4px}
.ec-desc{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:10px}
.ec-pricing{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.ep-l{font-size:10px;color:var(--tx2);margin-bottom:2px}
.ep-v{font-size:13px;font-weight:600}
.ep-v.grn{color:var(--green)}
.tbar{height:3px;background:var(--border);border-radius:2px;margin-bottom:3px}
.tfill{height:100%;background:var(--purple);border-radius:2px}
.tl{font-size:10px;color:var(--tx2)}
.ec-reason{font-size:10px;color:var(--tx2);font-style:italic;border-left:2px solid var(--border);padding-left:5px;line-height:1.4;margin-top:8px}
.mkt-pg{padding:0 20px 20px}
.mkt-selector{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.mkt-sel-label{font-size:12px;color:var(--tx2);margin-bottom:8px}
.prod-pills{display:flex;gap:6px;flex-wrap:wrap}
.pp{padding:5px 11px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:11px;color:var(--tx2);transition:all .15s;background:none;font-family:inherit}
.pp:hover{border-color:var(--purple-l);color:var(--tx1)}
.pp.sel{border-color:var(--purple);background:rgba(124,58,237,.15);color:var(--purple-l)}
.agent-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.at{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--tx2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.at:hover{color:var(--tx1)}
.at.active{background:var(--purple);border-color:var(--purple);color:white}
.mkt-output{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;min-height:200px}
.mkt-out-text{font-size:13px;line-height:1.7;color:var(--tx1);white-space:pre-wrap}
.mkt-empty{color:var(--tx2);font-size:13px;text-align:center;padding:40px 0}
.gen-btn{background:var(--purple);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;margin-top:12px}
.gen-btn:hover{background:#6d28d9}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.settings-pg{padding:0 20px 20px}
.set-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px}
.set-t{font-size:14px;font-weight:600;margin-bottom:4px}
.set-s{font-size:12px;color:var(--tx2);margin-bottom:14px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-label{font-size:13px}
.set-val{font-size:12px;color:var(--purple-l)}
.set-val.orange{color:var(--orange)}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="logo">
    <div class="logo-row">
      <div class="logo-icon">📈</div>
      <div><div class="logo-name">TrendScout</div><div class="logo-sub">AI Product Discovery</div></div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-item active" onclick="nav('dashboard')" id="nb-dashboard"><span class="nav-icon">⊞</span>Dashboard</button>
    <button class="nav-item" onclick="nav('top5')" id="nb-top5"><span class="nav-icon">🏆</span>Top 5 Report</button>
    <button class="nav-item" onclick="nav('etsy')" id="nb-etsy"><span class="nav-icon">◻</span>Etsy Printables</button>
    <button class="nav-item" onclick="nav('marketing')" id="nb-marketing"><span class="nav-icon">📣</span>Marketing Team</button>
    <button class="nav-item" onclick="nav('settings')" id="nb-settings"><span class="nav-icon">⚙</span>Settings</button>
  </div>
  <div class="sidebar-foot"><div class="dot"></div>AI Engine Ready</div>
</div>
<div class="main" id="main"></div>
</div>

<div class="overlay" id="overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>

<script>
const S={
  page:'dashboard',products:[],etsy:[],
  scanning:false,catFilter:'All',
  mktProduct:null,mktAgent:'cmo',
  mktOutputs:{},mktGenerating:false
};

const CATS=['All','Pet Supplies','Beauty & Personal Care','Home & Kitchen','Health & Wellness','Consumer Electronics','Fashion & Apparel','Furniture & Home Decor'];

const AGENTS=[
  {id:'cmo',label:'CMO Strategy'},
  {id:'adcopy',label:'Ad Copywriter'},
  {id:'email',label:'Email Sequence'},
  {id:'social',label:'Social Calendar'},
  {id:'pricing',label:'Pricing Expert'}
];

function nav(p){
  S.page=p;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nb-'+p).classList.add('active');
  render();
}

function render(){
  const m=document.getElementById('main');
  if(S.page==='dashboard')m.innerHTML=renderDashboard();
  else if(S.page==='top5')m.innerHTML=renderTop5();
  else if(S.page==='etsy')m.innerHTML=renderEtsy();
  else if(S.page==='marketing')m.innerHTML=renderMarketing();
  else if(S.page==='settings')m.innerHTML=renderSettings();
}

function renderDashboard(){
  const filtered=S.catFilter==='All'?S.products:S.products.filter(p=>p.category===S.catFilter);
  const catCounts={};S.products.forEach(p=>{catCounts[p.category]=(catCounts[p.category]||0)+1});
  const viral=S.products.filter(p=>p.viralLevel==='viral').length;
  const avgProfit=S.products.length?Math.round(S.products.reduce((a,p)=>a+p.estimatedProfit,0)/S.products.length):0;
  let html=`
  <div class="ph">
    <div class="ph-left"><div class="pt">TrendScout</div><div class="ps">AI-powered trend intelligence and product validation</div></div>
    <button class="btn-scan" onclick="runScan()" ${S.scanning?'disabled':''}>
      ${S.scanning?'<div style="width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite"></div> Scanning...':'🔍 Run AI Scan'}
    </button>
  </div>
  <div class="stats">
    <div class="sc"><div class="sc-label">📈 Trending Products</div><div class="sc-val">${S.products.length}</div></div>
    <div class="sc"><div class="sc-label">💰 Avg Est. Profit</div><div class="sc-val">$${avgProfit}</div></div>
    <div class="sc"><div class="sc-label">⚡ Viral Potential</div><div class="sc-val">${viral}</div></div>
  </div>
  <div class="filter-row">
    ${CATS.map(c=>`<button class="fb${S.catFilter===c?' active':''}" onclick="setFilter('${c}')">${c}${catCounts[c]?` (${catCounts[c]})`:c==='All'&&S.products.length?` (${S.products.length})`:''}</button>`).join('')}
    <div class="exp-btns">
      <button class="eb" onclick="exportCSV()">⬇ CSV (${filtered.length})</button>
      <button class="eb grn" onclick="exportAutoDS()">⬇ AutoDS (${filtered.length})</button>
    </div>
  </div>`;
  if(S.scanning){
    html+=`<div class="spin-wrap"><div class="spinner"></div><div class="spin-t">Scanning trending products...</div><div class="spin-s">Analyzing signals across Amazon, Walmart, TikTok & more</div></div>`;
  }else if(!S.products.length){
    html+=`<div class="empty"><div class="empty-icon">📡</div><div class="empty-t">No products scanned yet</div><div>Hit "Run AI Scan" to discover trending products</div></div>`;
  }else{
    html+=`<div class="grid">${filtered.map(p=>renderCard(p)).join('')}</div>`;
  }
  return html;
}

function renderCard(p){
  const bl=p.viralLevel==='viral'?'<span class="bv">VIRAL</span>':p.viralLevel==='high'?'<span class="bh">HIGH</span>':'<span class="bm">MEDIUM</span>';
  return `<div class="pc" onclick="openProduct('${p.id}')">
    <div class="pc-top"><div class="pc-name">${p.name}</div><div class="rank-b">Rank ${p.rank}</div></div>
    <div class="badges">${bl}<span class="bs">📈 ${p.trendScore}</span><span class="bsrc">${p.source}</span></div>
    <div class="pc-desc">${p.description}</div>
    <div class="pc-why">${p.whyTrending}</div>
  </div>`;
}

function renderTop5(){
  const byCat={};
  S.products.forEach(p=>{if(!byCat[p.category])byCat[p.category]=[];byCat[p.category].push(p);});
  Object.keys(byCat).forEach(c=>byCat[c].sort((a,b)=>b.trendScore-a.trendScore));
  const cats=Object.keys(byCat);
  if(!cats.length)return`<div class="ph"><div class="ph-left"><div class="pt">Top 5 Report</div><div class="ps">Highest trending products by category</div></div></div><div class="empty"><div class="empty-icon">🏆</div><div class="empty-t">Run a scan first</div></div>`;
  return`<div class="ph"><div class="ph-left"><div class="pt">Top 5 by Category</div><div class="ps">Highest trending products ranked by trend score</div></div></div>
  <div class="t5-grid">${cats.map(cat=>{
    const items=byCat[cat].slice(0,5);
    return`<div class="t5c"><div class="t5h"><div><div class="t5-cat">${cat}</div><div class="t5-cnt">${items.length} products</div></div><button class="t5-ex" onclick="exportCatCSV('${cat}')">⬇ Shopify CSV</button></div>
    ${items.map((p,i)=>{
      const bl=p.viralLevel==='viral'?'<span class="bv" style="font-size:9px">viral</span>':p.viralLevel==='high'?'<span class="bh" style="font-size:9px">high</span>':'<span class="bm" style="font-size:9px">med</span>';
      return`<div class="t5i"><div class="t5r">${i+1}</div><div class="t5info"><div class="t5n">${p.name}</div><div class="t5m">$${p.estimatedProfit.toFixed(2)} profit (${p.profitMargin}% margin)</div></div><div class="t5bs">${bl}<span class="bs" style="font-size:9px">📈${p.trendScore}</span></div></div>`;
    }).join('')}</div>`;
  }).join('')}</div>`;
}

function renderEtsy(){
  if(!S.etsy.length)return`<div class="ph"><div class="ph-left"><div class="pt">Etsy Printables</div><div class="ps">Digital product opportunities linked to your trending categories</div></div><button class="btn-scan" onclick="runScan()">🔍 Run AI Scan</button></div><div class="empty"><div class="empty-icon">◻</div><div class="empty-t">Run a scan first</div><div>Etsy ideas are generated from your trending product data</div></div>`;
  return`<div class="ph"><div class="ph-left"><div class="pt">Etsy Printables</div><div class="ps">${S.etsy.length} digital product ideas linked to your trending categories</div></div><button class="eb" onclick="exportEtsyCSV()">⬇ Export CSV</button></div>
  <div class="etsy-grid">${S.etsy.map(e=>{
    const cc=e.competition==='low'?'c-low':e.competition==='medium'?'c-med':'c-high';
    return`<div class="ec"><div class="ec-name">${e.name}</div>
    <div class="ec-badges"><span class="ec-cat">${e.category}</span><span class="${cc}">${e.competition} competition</span></div>
    <div style="font-size:10px;color:var(--tx2);margin-bottom:6px">🔗 ${e.linkedTrend}</div>
    <div class="ec-desc">${e.description}</div>
    <div class="ec-pricing">
      <div><div class="ep-l">Price Low</div><div class="ep-v">$${e.priceLow}</div></div>
      <div><div class="ep-l">Price High</div><div class="ep-v">$${e.priceHigh}</div></div>
      <div><div class="ep-l">Margin</div><div class="ep-v grn">${e.margin}%</div></div>
    </div>
    <div class="tbar"><div class="tfill" style="width:${e.trendScore}%"></div></div>
    <div class="tl">Trend ${e.trendScore}/100</div>
    <div class="ec-reason">${e.trendReason}</div></div>`;
  }).join('')}</div>`;
}

function renderMarketing(){
  return`<div class="ph"><div class="ph-left"><div class="pt">Marketing Team</div><div class="ps">AI-powered marketing for your trending products</div></div></div>
  <div class="mkt-pg">
    <div class="mkt-selector">
      <div class="mkt-sel-label">${!S.products.length?'Run a scan first to load products':'Select a product to market:'}</div>
      ${S.products.length?`<div class="prod-pills">${S.products.slice(0,15).map(p=>`<button class="pp${S.mktProduct&&S.mktProduct.id===p.id?' sel':''}" onclick="selectMktProduct('${p.id}')">${p.name.length>40?p.name.slice(0,40)+'...':p.name}</button>`).join('')}</div>`:''}
    </div>
    ${S.mktProduct?`
    <div class="agent-tabs">${AGENTS.map(a=>`<button class="at${S.mktAgent===a.id?' active':''}" onclick="selectAgent('${a.id}')">${a.label}</button>`).join('')}</div>
    <div class="mkt-output">
      ${S.mktGenerating?`<div class="spin-wrap" style="padding:20px 0"><div class="spinner"></div><div class="spin-t" style="font-size:13px">Working...</div></div>`
      :S.mktOutputs[S.mktProduct.id+'_'+S.mktAgent]?`<div class="mkt-out-text" id="mkt-out">${S.mktOutputs[S.mktProduct.id+'_'+S.mktAgent]}</div>`
      :`<div class="mkt-empty">Click Generate to create ${AGENTS.find(a=>a.id===S.mktAgent)?.label} content<br>for <strong>${S.mktProduct.name}</strong></div>`}
      ${!S.mktGenerating?`<button class="gen-btn" onclick="generateMarketing()">✨ Generate ${AGENTS.find(a=>a.id===S.mktAgent)?.label}</button>`:''}
    </div>`:''}
  </div>`;
}

function renderSettings(){
  return`<div class="ph"><div class="ph-left"><div class="pt">Settings</div><div class="ps">Configure TrendScout preferences</div></div></div>
  <div class="settings-pg">
    <div class="set-card">
      <div class="set-t">Data Sources</div><div class="set-s">Where TrendScout pulls product signals from</div>
      <div class="set-row"><div class="set-label">Amazon Best Sellers</div><div class="set-val">✓ Active</div></div>
      <div class="set-row"><div class="set-label">TikTok Trends</div><div class="set-val">✓ Active</div></div>
      <div class="set-row"><div class="set-label">Google Trends</div><div class="set-val">✓ Active</div></div>
      <div class="set-row"><div class="set-label">Etsy Search Trends</div><div class="set-val">✓ Active</div></div>
    </div>
    <div class="set-card">
      <div class="set-t">Integrations</div><div class="set-s">Your connected platforms</div>
      <div class="set-row"><div class="set-label">Shopify — Adam's Corner</div><div class="set-val">✓ Connected</div></div>
      <div class="set-row"><div class="set-label">AutoDS</div><div class="set-val">✓ Connected</div></div>
      <div class="set-row"><div class="set-label">Etsy Shop</div><div class="set-val orange">Connect →</div></div>
    </div>
    <div class="set-card">
      <div class="set-t">Scan Preferences</div><div class="set-s">What TrendScout looks for</div>
      <div class="set-row"><div class="set-label">Min Profit Margin</div><div class="set-val">40%</div></div>
      <div class="set-row"><div class="set-label">Max Product Price</div><div class="set-val">$500</div></div>
      <div class="set-row"><div class="set-label">Primary Categories</div><div class="set-val">Pet Supplies, Beauty</div></div>
    </div>
  </div>`;
}

function setFilter(cat){S.catFilter=cat;render();}

async function runScan(){
  if(S.scanning)return;
  S.scanning=true;S.mktOutputs={};render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        messages:[{role:'user',content:`You are a product trend analyst for a dropshipping business in April 2026. Return ONLY a valid JSON object with no markdown, no backticks, no explanation before or after.

Generate exactly 30 trending products across: Pet Supplies, Beauty & Personal Care, Home & Kitchen, Health & Wellness, Consumer Electronics, Fashion & Apparel, Furniture & Home Decor. Include at least 5 in Pet Supplies and 5 in Beauty & Personal Care.

Also generate exactly 9 Etsy digital printable ideas directly connected to the trending product categories.

Return this exact JSON structure:
{"products":[{"id":"p1","name":"string","category":"string","source":"Amazon","trendScore":98,"viralLevel":"viral","rank":1,"description":"string","whyTrending":"string","retailPrice":49.99,"estimatedCost":18.00,"estimatedProfit":31.99,"profitMargin":64,"salesVelocity":"Rank 1"}],"etsyPrintables":[{"id":"e1","name":"string","category":"string","linkedTrend":"Pet Supplies","competition":"low","description":"string","priceLow":5,"priceHigh":15,"margin":82,"trendScore":85,"trendReason":"string"}]}`}]
      })
    });
    const data=await res.json();
    const txt=data.content.map(c=>c.text||'').join('');
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    S.products=parsed.products||[];
    S.etsy=parsed.etsyPrintables||[];
    S.catFilter='All';
  }catch(e){console.error(e);}
  S.scanning=false;render();
}

function openProduct(id){
  const p=S.products.find(x=>x.id===id);if(!p)return;
  document.getElementById('modal-box').innerHTML=`
    <div class="mh"><div class="mt">${p.name}</div><button class="mc" onclick="closeModal()">✕</button></div>
    <div style="padding:10px 18px 0;display:flex;gap:6px;flex-wrap:wrap">
      ${p.viralLevel==='viral'?'<span class="bv">VIRAL</span>':p.viralLevel==='high'?'<span class="bh">HIGH</span>':'<span class="bm">MEDIUM</span>'}
      <span style="font-size:12px;color:var(--tx2)">${p.category}</span>
    </div>
    <div class="ms"><div class="ms-t">Source</div>
      <div class="src-box"><div style="font-size:13px;font-weight:600">${p.source}</div></div>
    </div>
    <div class="ms"><div class="ms-t">Overview</div>
      <div style="margin-bottom:10px"><div style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Description</div><div style="font-size:13px;line-height:1.6">${p.description}</div></div>
      <div style="margin-bottom:10px"><div style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Why It's Trending</div><div style="font-size:13px;line-height:1.6">${p.whyTrending}</div></div>
      <div><div style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Sales Velocity</div><div style="font-size:13px">${p.salesVelocity}</div></div>
    </div>
    <div class="ms"><div class="ms-t">Financials</div>
      <div class="fin-grid">
        <div class="fin-item"><div class="fl">Trend Score</div><div class="fv">${p.trendScore}</div></div>
        <div class="fin-item"><div class="fl">Retail Price</div><div class="fv">$${p.retailPrice.toFixed(2)}</div></div>
        <div class="fin-item"><div class="fl">Est. Cost</div><div class="fv">$${p.estimatedCost.toFixed(2)}</div></div>
        <div class="fin-item"><div class="fl">Est. Profit</div><div class="fv green">$${p.estimatedProfit.toFixed(2)}</div></div>
        <div class="fin-item"><div class="fl">Margin</div><div class="fv green">${p.profitMargin}%</div></div>
      </div>
    </div>
    <div class="ms"><button class="mkt-btn" onclick="closeModal();nav('marketing');selectMktProduct('${p.id}')">📣 Generate Marketing for This Product</button></div>`;
  document.getElementById('overlay').style.display='flex';
}

function closeModal(){document.getElementById('overlay').style.display='none';}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function selectMktProduct(id){S.mktProduct=S.products.find(p=>p.id===id)||null;render();}
function selectAgent(id){S.mktAgent=id;render();}

async function generateMarketing(){
  if(!S.mktProduct||S.mktGenerating)return;
  S.mktGenerating=true;render();
  const p=S.mktProduct;
  const prompts={
    cmo:`You are a world-class CMO. Create a go-to-market strategy for: "${p.name}" (${p.category}). Price: $${p.retailPrice}. Profit: $${p.estimatedProfit}. Trending because: ${p.whyTrending}. Include: 1) Positioning statement 2) Target customer 3) Top 3 channels 4) 30-day launch plan 5) Creative angle competitors miss. Be direct and specific.`,
    adcopy:`You are an elite direct-response copywriter. Write 3 ad scripts for: "${p.name}" at $${p.retailPrice}. Trending: ${p.whyTrending}. Each under 30 seconds. Format: [Hook] [Problem] [Solution] [CTA]. One pain-based, one curiosity-based, one results-based. For Meta and TikTok.`,
    email:`You are a top email marketer. Write a 5-email launch sequence for: "${p.name}" at $${p.retailPrice}. Trending: ${p.whyTrending}. Include: 1) Teaser 2) Problem agitation 3) Product reveal 4) Objection handler 5) Last chance. Each email: subject line, preview text, body under 150 words.`,
    social:`You are a social media strategist. Create a 14-day content calendar for: "${p.name}" at $${p.retailPrice}. Trending: ${p.whyTrending}. One post per day for TikTok/Reels. For each: post type, hook line, key message.`,
    pricing:`You are a pricing expert. Design a pricing architecture for: "${p.name}" at $${p.retailPrice} with $${p.estimatedProfit} profit. Include: 1) Optimal price with rationale 2) 3-tier structure 3) High-ticket upsell ($200+) 4) Bundle idea 5) Psychological pricing tactics. Be specific with dollar amounts.`
  };
  const key=p.id+'_'+S.mktAgent;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,stream:true,messages:[{role:'user',content:prompts[S.mktAgent]}]})
    });
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let out='';
    S.mktOutputs[key]='';
    S.mktGenerating=false;render();
    const outEl=document.getElementById('mkt-out');
    while(true){
      const{done,value}=await reader.read();if(done)break;
      const chunk=dec.decode(value,{stream:true});
      for(const line of chunk.split('\n')){
        if(line.startsWith('data: ')){
          const d=line.slice(6).trim();if(d==='[DONE]')continue;
          try{const j=JSON.parse(d);if(j.delta?.text){out+=j.delta.text;S.mktOutputs[key]=out;if(outEl)outEl.textContent=out;}}catch(e){}
        }
      }
    }
  }catch(e){S.mktOutputs[key]='Error — please try again.';}
  S.mktGenerating=false;render();
}

function exportCSV(){
  const f=S.catFilter==='All'?S.products:S.products.filter(p=>p.category===S.catFilter);
  const rows=[['Name','Category','Source','Trend Score','Viral Level','Retail Price','Est Cost','Est Profit','Profit Margin %','Why Trending']];
  f.forEach(p=>rows.push([`"${p.name}"`,p.category,p.source,p.trendScore,p.viralLevel,p.retailPrice,p.estimatedCost,p.estimatedProfit,p.profitMargin,`"${p.whyTrending}"`]));
  dl(rows,'trendscout_products.csv');
}

function exportAutoDS(){
  const f=S.catFilter==='All'?S.products:S.products.filter(p=>p.category===S.catFilter);
  const rows=[['Product Title','Category','Source Platform','Selling Price','Product Cost','Profit','Margin %','Trend Score','Status']];
  f.forEach(p=>rows.push([`"${p.name}"`,p.category,p.source,p.retailPrice,p.estimatedCost,p.estimatedProfit,p.profitMargin,p.trendScore,'Ready to Import']));
  dl(rows,'autods_import.csv');
}

function exportCatCSV(cat){
  const items=S.products.filter(p=>p.category===cat).slice(0,5);
  const rows=[['Name','Retail Price','Est Profit','Margin %','Trend Score']];
  items.forEach(p=>rows.push([`"${p.name}"`,p.retailPrice,p.estimatedProfit,p.profitMargin,p.trendScore]));
  dl(rows,`top5_${cat.replace(/\s+/g,'_')}.csv`);
}

function exportEtsyCSV(){
  const rows=[['Name','Category','Linked Trend','Competition','Price Low','Price High','Margin %','Trend Score']];
  S.etsy.forEach(e=>rows.push([`"${e.name}"`,e.category,e.linkedTrend,e.competition,e.priceLow,e.priceHigh,e.margin,e.trendScore]));
  dl(rows,'etsy_printables.csv');
}

function dl(rows,filename){
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download=filename;a.click();
}

render();
</script>
